<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  :root { --ink:#0d1117; --paper:#f5f0e8; --accent:#c0392b; --muted:#7a6f5e; --border:#2a2a2a; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height: 100vh;
    background: var(--ink);
    font-family: 'DM Sans', sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .wrap {
    width: 100%; max-width: 380px; padding: 24px;
    animation: fadeUp 0.5s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .logo {
    text-align: center; margin-bottom: 32px;
  }
  .shield {
    font-size: 36px; margin-bottom: 12px; display: block;
  }
  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 18px; color: var(--paper);
  }
  .logo-sub {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: #555; margin-top: 4px;
  }

  .card {
    background: #0f0f0f;
    border: 1px solid #222;
    padding: 32px;
  }
  h2 {
    font-family: 'Playfair Display', serif;
    color: var(--paper); font-size: 22px; margin-bottom: 6px;
  }
  .sub { font-size: 13px; color: #666; margin-bottom: 24px; }

  .error-box {
    background: #1a0a0a; border: 1px solid #5a1a1a;
    border-left: 3px solid var(--accent);
    padding: 10px 12px; font-size: 13px; color: #e07070;
    margin-bottom: 18px;
  }

  label {
    display: block; font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; color: #555; margin-bottom: 7px;
  }
  input[type=password] {
    width: 100%; padding: 12px 14px;
    background: #1a1a1a; border: 1px solid #333;
    color: var(--paper); font-family: 'DM Mono', monospace;
    font-size: 16px; outline: none;
    transition: border-color 0.2s;
    letter-spacing: 3px;
  }
  input[type=password]:focus { border-color: var(--paper); }

  .btn {
    width: 100%; margin-top: 20px;
    padding: 13px;
    background: var(--accent); border: none;
    color: #fff; font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 600;
    letter-spacing: 3px; text-transform: uppercase;
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }

  .back-link {
    text-align: center; margin-top: 20px;
    font-size: 12px; color: #444;
  }
  .back-link a { color: #666; text-decoration: none; }
  .back-link a:hover { color: var(--paper); }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <span class="shield">🔐</span>
    <div class="logo-text">Admin Portal</div>
    <div class="logo-sub">Restricted Access</div>
  </div>
  <div class="card">
    <h2>Administrator Login</h2>
    <p class="sub">Enter your credentials to access the dashboard.</p>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label>Admin Password</label>
      <input type="password" name="password" placeholder="••••••••" required autofocus>
      <button type="submit" class="btn">Authenticate →</button>
    </form>
  </div>
  <div class="back-link"><a href="/student/login">← Student Login</a></div>
</div>
</body>
</html>
